syntax = "proto3";

package erp.procurement.v1;

option go_package = "erp/platform/genproto/erp/procurement/v1;procurementv1";

message Supplier {
  string id = 1;
  string name = 2;
  string contact_email = 3;
  int64 created_at_unix = 4;
}

message PurchaseOrderLine {
  string product_id = 1;
  int32 quantity = 2;
  string unit_price = 3;
}

message PurchaseOrder {
  string id = 1;
  string supplier_id = 2;
  string status = 3;
  string total_amount = 4;
  int64 created_at_unix = 5;
  repeated PurchaseOrderLine lines = 6;
}

message CreateSupplierRequest {
  string name = 1;
  string contact_email = 2;
}

message ListSuppliersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListSuppliersResponse {
  repeated Supplier suppliers = 1;
}

message CreatePurchaseOrderRequest {
  string supplier_id = 1;
  repeated PurchaseOrderLine lines = 2;
}

message GetPurchaseOrderRequest {
  string id = 1;
}

message ListPurchaseOrdersRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListPurchaseOrdersResponse {
  repeated PurchaseOrder orders = 1;
}

service ProcurementService {
  rpc CreateSupplier(CreateSupplierRequest) returns (Supplier);
  rpc ListSuppliers(ListSuppliersRequest) returns (ListSuppliersResponse);
  rpc CreatePurchaseOrder(CreatePurchaseOrderRequest) returns (PurchaseOrder);
  rpc GetPurchaseOrder(GetPurchaseOrderRequest) returns (PurchaseOrder);
  rpc ListPurchaseOrders(ListPurchaseOrdersRequest) returns (ListPurchaseOrdersResponse);
}
